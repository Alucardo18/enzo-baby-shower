<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ENZO FEST // NEBULA — Proyección Holográfica</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@300;400;700;900&family=Space+Grotesk:wght@300;400;500&display=swap" rel="stylesheet">

    <style>
        :root {
            --amber: #ffb300;
            --amber-dim: rgba(255, 179, 0, 0.15);
            --amber-glow: rgba(255, 179, 0, 0.6);
            --amber-hot: #ff8c00;
            --bg: #000000;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body, html {
            width: 100%; height: 100%;
            overflow: hidden;
            background: var(--bg);
            font-family: 'Space Grotesk', sans-serif;
            color: var(--amber);
            cursor: none;
        }

        /* ── LAYERS ─────────────────────────────────────── */
        #canvas-stars  { position: absolute; inset: 0; z-index: 1; }
        #canvas-nebula { position: absolute; inset: 0; z-index: 2; }
        #canvas-holo   { position: absolute; inset: 0; z-index: 3; }
        #canvas-fx     { position: absolute; inset: 0; z-index: 4; pointer-events: none; }

        /* ── HUD OVERLAY ────────────────────────────────── */
        .hud {
            position: absolute; inset: 0; z-index: 10;
            pointer-events: none;
        }

        /* Top bar */
        .hud-top {
            position: absolute; top: 0; left: 0; right: 0;
            display: flex; align-items: center; justify-content: space-between;
            padding: 28px 48px 0;
        }

        .hud-title {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(1.1rem, 2.5vw, 2rem);
            font-weight: 900;
            letter-spacing: 0.25em;
            color: var(--amber);
            text-shadow: 0 0 30px var(--amber-glow), 0 0 60px rgba(255,179,0,0.3);
        }

        .hud-title span {
            color: rgba(255,179,0,0.4);
            font-weight: 300;
        }

        .hud-badge {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.65rem;
            font-weight: 400;
            letter-spacing: 0.3em;
            color: rgba(255,179,0,0.5);
            border: 1px solid rgba(255,179,0,0.2);
            padding: 6px 14px;
            border-radius: 2px;
        }

        /* Bottom HUD */
        .hud-bottom {
            position: absolute; bottom: 0; left: 0; right: 0;
            display: flex; align-items: flex-end; justify-content: space-between;
            padding: 0 48px 32px;
        }

        /* Heartbeat panel */
        .hud-heart {
            display: flex; flex-direction: column; gap: 8px;
        }

        .hud-label {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.55rem;
            letter-spacing: 0.35em;
            color: rgba(255,179,0,0.4);
        }

        #ecg-canvas {
            width: 220px; height: 50px;
            border-bottom: 1px solid rgba(255,179,0,0.2);
        }

        .hud-bpm {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--amber);
            text-shadow: 0 0 20px var(--amber-glow);
            line-height: 1;
        }

        .hud-bpm span {
            font-size: 0.6rem;
            font-weight: 300;
            letter-spacing: 0.2em;
            color: rgba(255,179,0,0.5);
            margin-left: 6px;
        }

        /* Info panel right */
        .hud-info {
            display: flex; flex-direction: column;
            align-items: flex-end; gap: 6px;
        }

        .hud-info-row {
            font-size: 0.7rem;
            letter-spacing: 0.15em;
            color: rgba(255,179,0,0.45);
        }

        .hud-info-row strong {
            color: rgba(255,179,0,0.8);
            font-weight: 500;
        }

        /* Center name panel */
        .hud-center {
            position: absolute;
            bottom: 120px; left: 50%; transform: translateX(-50%);
            text-align: center;
            opacity: 0;
            transition: opacity 2s ease;
        }

        .hud-center.visible { opacity: 1; }

        .hud-name {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(2.5rem, 7vw, 5.5rem);
            font-weight: 900;
            letter-spacing: 0.35em;
            color: var(--amber);
            text-shadow:
                0 0 40px var(--amber-glow),
                0 0 80px rgba(255,179,0,0.3),
                0 0 120px rgba(255,140,0,0.15);
            line-height: 1;
        }

        .hud-subtitle {
            font-size: clamp(0.65rem, 1.5vw, 0.9rem);
            letter-spacing: 0.55em;
            color: rgba(255,179,0,0.45);
            margin-top: 12px;
            font-weight: 300;
        }

        /* Corner decorations */
        .corner {
            position: absolute; width: 40px; height: 40px;
        }
        .corner-tl { top: 20px; left: 20px; border-top: 2px solid rgba(255,179,0,0.4); border-left: 2px solid rgba(255,179,0,0.4); }
        .corner-tr { top: 20px; right: 20px; border-top: 2px solid rgba(255,179,0,0.4); border-right: 2px solid rgba(255,179,0,0.4); }
        .corner-bl { bottom: 20px; left: 20px; border-bottom: 2px solid rgba(255,179,0,0.4); border-left: 2px solid rgba(255,179,0,0.4); }
        .corner-br { bottom: 20px; right: 20px; border-bottom: 2px solid rgba(255,179,0,0.4); border-right: 2px solid rgba(255,179,0,0.4); }

        /* Scan line top indicator */
        .scan-indicator {
            position: absolute; top: 28px; left: 50%; transform: translateX(-50%);
            font-family: 'Orbitron', sans-serif;
            font-size: 0.5rem;
            letter-spacing: 0.4em;
            color: rgba(255,179,0,0.25);
            animation: blink 3s ease-in-out infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 0.25; }
            50% { opacity: 0.8; }
        }

        /* Vignette overlay */
        .vignette {
            position: absolute; inset: 0; z-index: 9; pointer-events: none;
            background: radial-gradient(ellipse at center,
                transparent 45%,
                rgba(0,0,0,0.5) 70%,
                rgba(0,0,0,0.88) 100%
            );
        }

        /* START SCREEN */
        #start-screen {
            position: absolute; inset: 0; z-index: 100;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            background: radial-gradient(ellipse at center,
                rgba(20,10,0,0.98) 0%,
                rgba(0,0,0,0.99) 100%
            );
            transition: opacity 1.5s ease;
        }

        #start-screen.fade-out { opacity: 0; pointer-events: none; }

        .start-logo {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(3rem, 10vw, 7rem);
            font-weight: 900;
            letter-spacing: 0.4em;
            color: var(--amber);
            text-shadow: 0 0 60px var(--amber-glow), 0 0 100px rgba(255,140,0,0.3);
            animation: pulse-glow 2s ease-in-out infinite;
            margin-bottom: 16px;
        }

        .start-sub {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(0.6rem, 1.5vw, 0.85rem);
            letter-spacing: 0.5em;
            color: rgba(255,179,0,0.4);
            margin-bottom: 80px;
        }

        @keyframes pulse-glow {
            0%, 100% { text-shadow: 0 0 60px var(--amber-glow), 0 0 100px rgba(255,140,0,0.3); }
            50% { text-shadow: 0 0 80px rgba(255,179,0,0.9), 0 0 140px rgba(255,140,0,0.5); }
        }

        #start-btn {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.8rem;
            font-weight: 700;
            letter-spacing: 0.4em;
            color: var(--bg);
            background: var(--amber);
            border: none;
            padding: 18px 56px;
            cursor: pointer;
            clip-path: polygon(8px 0%, 100% 0%, calc(100% - 8px) 100%, 0% 100%);
            transition: all 0.3s ease;
            text-transform: uppercase;
            pointer-events: all;
        }

        #start-btn:hover {
            background: #fff;
            box-shadow: 0 0 40px rgba(255,179,0,0.8);
            transform: scale(1.04);
        }

        .start-hint {
            margin-top: 24px;
            font-size: 0.6rem;
            letter-spacing: 0.3em;
            color: rgba(255,179,0,0.2);
        }
    </style>
</head>
<body>

<!-- ═══ CANVAS LAYERS ═══════════════════════════════════ -->
<canvas id="canvas-stars"></canvas>
<canvas id="canvas-nebula"></canvas>
<canvas id="canvas-holo"></canvas>
<canvas id="canvas-fx"></canvas>

<!-- ═══ VIGNETTE ════════════════════════════════════════ -->
<div class="vignette"></div>

<!-- ═══ HUD ════════════════════════════════════════════ -->
<div class="hud">
    <div class="corner corner-tl"></div>
    <div class="corner corner-tr"></div>
    <div class="corner corner-bl"></div>
    <div class="corner corner-br"></div>

    <div class="scan-indicator">◈ HOLOGRAPHIC PROJECTION ACTIVE ◈</div>

    <div class="hud-top">
        <div class="hud-title">ENZO <span>FEST</span></div>
        <div class="hud-badge">NEBULA // 2026</div>
    </div>

    <div class="hud-center" id="hud-center">
        <div class="hud-name">ENZO</div>
        <div class="hud-subtitle">BIENVENIDO AL UNIVERSO</div>
    </div>

    <div class="hud-bottom">
        <div class="hud-heart">
            <div class="hud-label">CARDIAC SIGNAL</div>
            <canvas id="ecg-canvas" width="220" height="50"></canvas>
            <div class="hud-bpm" id="bpm-display">148<span>BPM</span></div>
        </div>
        <div class="hud-info">
            <div class="hud-info-row">SEMANA <strong>32</strong></div>
            <div class="hud-info-row">PESO <strong>1.8 KG</strong></div>
            <div class="hud-info-row">SEÑAL <strong id="signal-strength">98.6%</strong></div>
            <div class="hud-info-row">STATUS <strong style="color:var(--amber)">◈ ÓPTIMO</strong></div>
        </div>
    </div>
</div>

<!-- ═══ START SCREEN ═════════════════════════════════════ -->
<div id="start-screen">
    <div class="start-logo">ENZO</div>
    <div class="start-sub">NEBULA HOLOGRAPHIC SYSTEM // V3.0</div>
    <button id="start-btn">INICIAR PROYECCIÓN</button>
    <div class="start-hint">◈ PRESIONA PARA COMENZAR ◈</div>
</div>

<script>
// ─────────────────────────────────────────────────────────
// ENZO FEST // NEBULA — Canvas 2D Holographic Visualizer
// Architecture: 4-layer canvas stack, zero WebGL/Three.js
// ─────────────────────────────────────────────────────────

const W = () => window.innerWidth;
const H = () => window.innerHeight;

// ── Canvas setup ──────────────────────────────────────────
function setupCanvas(id) {
    const c = document.getElementById(id);
    c.width = W(); c.height = H();
    return { c, ctx: c.getContext('2d') };
}

let stars_c, nebula_c, holo_c, fx_c;
let ctxS, ctxN, ctxH, ctxF;

function initCanvases() {
    ({ c: stars_c, ctx: ctxS } = setupCanvas('canvas-stars'));
    ({ c: nebula_c, ctx: ctxN } = setupCanvas('canvas-nebula'));
    ({ c: holo_c, ctx: ctxH } = setupCanvas('canvas-holo'));
    ({ c: fx_c, ctx: ctxF } = setupCanvas('canvas-fx'));
}

window.addEventListener('resize', () => {
    initCanvases();
    initStars();
    initParticles();
    buildScanLines();
});

// ─────────────────────────────────────────────────────────
// LAYER 1: STARFIELD
// ─────────────────────────────────────────────────────────
let starsArr = [];
const STAR_COUNT = 320;

function initStars() {
    starsArr = [];
    for (let i = 0; i < STAR_COUNT; i++) {
        starsArr.push({
            x: Math.random() * W(),
            y: Math.random() * H(),
            r: Math.random() * 1.4 + 0.2,
            a: Math.random(),
            speed: Math.random() * 0.3 + 0.05,
            twinkleOffset: Math.random() * Math.PI * 2,
        });
    }
}

function drawStars(t) {
    ctxS.clearRect(0, 0, W(), H());
    starsArr.forEach(s => {
        const tw = 0.4 + 0.6 * Math.sin(t * 0.001 + s.twinkleOffset);
        ctxS.beginPath();
        ctxS.arc(s.x, s.y, s.r, 0, Math.PI * 2);
        ctxS.fillStyle = `rgba(255,220,140,${s.a * tw})`;
        ctxS.fill();

        // slow drift
        s.y -= s.speed * 0.15;
        if (s.y < -2) { s.y = H() + 2; s.x = Math.random() * W(); }
    });
}

// ─────────────────────────────────────────────────────────
// LAYER 2: NEBULA / BACKGROUND GLOW
// ─────────────────────────────────────────────────────────
function drawNebula(t) {
    ctxN.clearRect(0, 0, W(), H());

    const cx = W() / 2, cy = H() / 2;
    const pulse = 1 + 0.06 * Math.sin(t * 0.0008);
    const breathe = 1 + 0.04 * Math.sin(t * 0.0005);

    // Deep glow core
    const g1 = ctxN.createRadialGradient(cx, cy, 0, cx, cy, Math.min(W(), H()) * 0.55 * pulse);
    g1.addColorStop(0, 'rgba(255,150,20,0.055)');
    g1.addColorStop(0.4, 'rgba(255,110,0,0.030)');
    g1.addColorStop(1, 'rgba(0,0,0,0)');
    ctxN.fillStyle = g1;
    ctxN.fillRect(0, 0, W(), H());

    // Secondary slower breathing glow
    const g2 = ctxN.createRadialGradient(
        cx + Math.sin(t * 0.0003) * 60,
        cy + Math.cos(t * 0.00025) * 40,
        0,
        cx, cy,
        Math.min(W(), H()) * 0.7 * breathe
    );
    g2.addColorStop(0, 'rgba(255,179,0,0.04)');
    g2.addColorStop(0.5, 'rgba(180,80,0,0.02)');
    g2.addColorStop(1, 'rgba(0,0,0,0)');
    ctxN.fillStyle = g2;
    ctxN.fillRect(0, 0, W(), H());

    // Orbiting dust rings
    const rings = [0.28, 0.42, 0.58];
    rings.forEach((rf, i) => {
        const rr = Math.min(W(), H()) * rf;
        const angleOffset = t * 0.00015 * (i % 2 === 0 ? 1 : -1) + i * 1.2;
        ctxN.save();
        ctxN.translate(cx, cy);
        ctxN.rotate(angleOffset);
        ctxN.beginPath();
        ctxN.ellipse(0, 0, rr, rr * 0.28, 0, 0, Math.PI * 2);
        ctxN.strokeStyle = `rgba(255,179,0,${0.04 - i * 0.01})`;
        ctxN.lineWidth = 0.5;
        ctxN.stroke();
        ctxN.restore();
    });
}

// ─────────────────────────────────────────────────────────
// LAYER 3: HOLOGRAM BABY
// ─────────────────────────────────────────────────────────
const holoImg = new Image();
holoImg.src = 'baby_holo.png';
let imgLoaded = false;
holoImg.onload = () => { imgLoaded = true; };

// Scanline cache
let scanLineCanvas = null;
function buildScanLines() {
    scanLineCanvas = document.createElement('canvas');
    scanLineCanvas.width = W();
    scanLineCanvas.height = H();
    const ctx = scanLineCanvas.getContext('2d');
    for (let y = 0; y < H(); y += 3) {
        ctx.fillStyle = 'rgba(0,0,0,0.18)';
        ctx.fillRect(0, y, W(), 1);
    }
}

// Hologram flicker state
let flickerPhase = 0;
let lastFlicker = 0;
const FLICKER_INTERVAL = 4200;

function drawHologram(t) {
    ctxH.clearRect(0, 0, W(), H());

    const cx = W() / 2, cy = H() / 2;
    const baseSize = Math.min(W(), H()) * 0.5;

    // Flicker logic
    if (t - lastFlicker > FLICKER_INTERVAL) {
        flickerPhase = t;
        lastFlicker = t;
    }
    const sinceFlicker = t - flickerPhase;
    let flickerAlpha = 1;
    if (sinceFlicker < 600) {
        // multiple rapid blinks
        flickerAlpha = Math.sin(sinceFlicker * 0.08) > 0 ? 1 : 0.1;
        if (sinceFlicker > 400) flickerAlpha = 1;
    }

    // Slow bob + gentle rotation
    const bobY = cy + Math.sin(t * 0.0006) * 18;
    const rotAngle = Math.sin(t * 0.00018) * 0.04;

    // Breathing scale
    const breathScale = 1 + 0.025 * Math.sin(t * 0.0008);
    const imgW = baseSize * breathScale;
    const imgH = baseSize * breathScale;

    ctxH.save();
    ctxH.translate(cx, bobY);
    ctxH.rotate(rotAngle);
    ctxH.globalAlpha = 0.85 * flickerAlpha;

    if (imgLoaded) {
        // Draw transparent PNG directly — no background square
        ctxH.drawImage(holoImg, -imgW / 2, -imgH / 2, imgW, imgH);

        // Second pass with 'lighter' blend for neon glow boost
        ctxH.globalAlpha = 0.45 * flickerAlpha;
        ctxH.globalCompositeOperation = 'lighter';
        ctxH.drawImage(holoImg, -imgW / 2, -imgH / 2, imgW, imgH);
        ctxH.globalCompositeOperation = 'source-over';
    }

    ctxH.restore();

    // ── Ambient glow ring under hologram ─────────────────
    ctxH.save();
    const glowPulse = 0.6 + 0.4 * Math.sin(t * 0.001);
    const gr = ctxH.createRadialGradient(cx, bobY, 0, cx, bobY, baseSize * 0.52);
    gr.addColorStop(0, `rgba(255,179,0,${0.12 * glowPulse * flickerAlpha})`);
    gr.addColorStop(0.5, `rgba(255,110,0,${0.06 * glowPulse * flickerAlpha})`);
    gr.addColorStop(1, 'rgba(0,0,0,0)');
    ctxH.globalCompositeOperation = 'lighter';
    ctxH.fillStyle = gr;
    ctxH.beginPath();
    ctxH.arc(cx, bobY, baseSize * 0.52, 0, Math.PI * 2);
    ctxH.fill();
    ctxH.globalCompositeOperation = 'source-over';
    ctxH.restore();

    // ── Scanlines overlay ─────────────────────────────────
    if (scanLineCanvas) {
        const scanShift = (t * 0.04) % H();
        ctxH.save();
        ctxH.globalAlpha = 0.35 * flickerAlpha;
        ctxH.drawImage(scanLineCanvas, 0, -scanShift);
        ctxH.drawImage(scanLineCanvas, 0, H() - scanShift);
        ctxH.restore();
    }

    // ── Chromatic aberration hint (offset copies) ────────
    if (imgLoaded && Math.random() > 0.88) {
        ctxH.save();
        ctxH.globalAlpha = 0.08 * flickerAlpha;
        ctxH.globalCompositeOperation = 'lighter';
        ctxH.translate(cx, bobY);
        ctxH.rotate(rotAngle);
        // Offset red
        ctxH.drawImage(holoImg, -imgW/2 - 4, -imgH/2, imgW, imgH);
        // Offset blue (shift canvas with filter trick)
        ctxH.drawImage(holoImg, -imgW/2 + 4, -imgH/2, imgW, imgH);
        ctxH.restore();
    }
}

// ─────────────────────────────────────────────────────────
// LAYER 4: FX PARTICLES
// ─────────────────────────────────────────────────────────
let particles = [];
const P_COUNT = 90;

function initParticles() {
    particles = [];
    const cx = W() / 2, cy = H() / 2;
    for (let i = 0; i < P_COUNT; i++) {
        const angle = Math.random() * Math.PI * 2;
        const radius = 80 + Math.random() * Math.min(W(), H()) * 0.28;
        particles.push({
            angle,
            radius,
            cx, cy,
            size: Math.random() * 2 + 0.3,
            speed: (Math.random() * 0.0003 + 0.0001) * (Math.random() > 0.5 ? 1 : -1),
            alpha: Math.random() * 0.6 + 0.1,
            drift: Math.random() * 0.5 - 0.25,
            driftPhase: Math.random() * Math.PI * 2,
            color: Math.random() > 0.15 ? 'amber' : 'white',
        });
    }
}

function drawParticles(t) {
    ctxF.clearRect(0, 0, W(), H());
    const cx = W() / 2, cy = H() / 2;

    particles.forEach(p => {
        p.angle += p.speed;
        const driftY = Math.sin(t * 0.0008 + p.driftPhase) * p.drift * 30;
        const x = cx + Math.cos(p.angle) * p.radius;
        const y = cy + Math.sin(p.angle) * p.radius * 0.42 + driftY;

        const flicker = 0.6 + 0.4 * Math.sin(t * 0.002 + p.driftPhase);
        const alpha = p.alpha * flicker;

        const col = p.color === 'white'
            ? `rgba(255,240,200,${alpha * 0.7})`
            : `rgba(255,179,0,${alpha})`;

        ctxF.beginPath();
        ctxF.arc(x, y, p.size, 0, Math.PI * 2);
        ctxF.fillStyle = col;
        ctxF.fill();

        // Tiny tail
        if (p.size > 1.2) {
            const prevX = cx + Math.cos(p.angle - p.speed * 6) * p.radius;
            const prevY = cy + Math.sin(p.angle - p.speed * 6) * p.radius * 0.42 + driftY;
            ctxF.beginPath();
            ctxF.moveTo(prevX, prevY);
            ctxF.lineTo(x, y);
            ctxF.strokeStyle = col;
            ctxF.lineWidth = p.size * 0.4;
            ctxF.globalAlpha = 0.3;
            ctxF.stroke();
            ctxF.globalAlpha = 1;
        }
    });
}

// ─────────────────────────────────────────────────────────
// ECG HEARTBEAT
// ─────────────────────────────────────────────────────────
const ecgCanvas = document.getElementById('ecg-canvas');
const ecgCtx = ecgCanvas.getContext('2d');
const ECG_W = 220, ECG_H = 50;
let ecgHistory = new Array(ECG_W).fill(ECG_H / 2);
let ecgPhase = 0;
let bpmDisplay = document.getElementById('bpm-display');
let bpmVal = 148;
let bpmTimer = 0;

function ecgSample(phase) {
    // Simulated fetal heartbeat waveform
    const mod = phase % (Math.PI * 2);
    const t = mod / (Math.PI * 2);

    if (t < 0.05) return ECG_H/2 - 2 * Math.sin(t / 0.05 * Math.PI); // P wave
    if (t < 0.12) return ECG_H/2; // flat
    if (t < 0.14) return ECG_H/2 + 3; // Q dip
    if (t < 0.17) return ECG_H/2 - 22; // R spike
    if (t < 0.20) return ECG_H/2 + 5; // S
    if (t < 0.30) return ECG_H/2 - 3 * Math.sin((t-0.20)/0.10 * Math.PI); // T wave
    return ECG_H/2; // flat
}

function drawECG(t) {
    ecgPhase += 0.12;
    ecgHistory.shift();
    ecgHistory.push(ecgSample(ecgPhase));

    ecgCtx.clearRect(0, 0, ECG_W, ECG_H);

    // Grid
    ecgCtx.strokeStyle = 'rgba(255,179,0,0.08)';
    ecgCtx.lineWidth = 0.5;
    for (let x = 0; x < ECG_W; x += 20) {
        ecgCtx.beginPath(); ecgCtx.moveTo(x, 0); ecgCtx.lineTo(x, ECG_H); ecgCtx.stroke();
    }

    // Waveform
    ecgCtx.beginPath();
    ecgCtx.moveTo(0, ecgHistory[0]);
    ecgHistory.forEach((y, x) => {
        ecgCtx.lineTo(x, y);
    });
    ecgCtx.strokeStyle = '#ffb300';
    ecgCtx.lineWidth = 1.5;
    ecgCtx.shadowColor = '#ffb300';
    ecgCtx.shadowBlur = 6;
    ecgCtx.stroke();
    ecgCtx.shadowBlur = 0;

    // BPM drift
    bpmTimer++;
    if (bpmTimer > 200) {
        bpmVal = 142 + Math.floor(Math.random() * 14);
        bpmTimer = 0;
        bpmDisplay.innerHTML = `${bpmVal}<span>BPM</span>`;
    }

    // Signal strength drift
    const sig = (97 + Math.sin(t * 0.0005) * 1.8).toFixed(1);
    document.getElementById('signal-strength').textContent = sig + '%';
}

// ─────────────────────────────────────────────────────────
// MAIN LOOP
// ─────────────────────────────────────────────────────────
let running = false;
let startTime = 0;
let animId = null;

function loop(ts) {
    if (!running) return;
    const t = ts - startTime;

    drawStars(t);
    drawNebula(t);
    drawHologram(t);
    drawParticles(t);
    drawECG(t);

    animId = requestAnimationFrame(loop);
}

function startVisualization() {
    running = true;
    startTime = performance.now();
    animId = requestAnimationFrame(loop);

    // Reveal name
    setTimeout(() => {
        document.getElementById('hud-center').classList.add('visible');
    }, 1800);
}

// ─────────────────────────────────────────────────────────
// START SCREEN
// ─────────────────────────────────────────────────────────
document.getElementById('start-btn').addEventListener('click', () => {
    const screen = document.getElementById('start-screen');
    screen.classList.add('fade-out');
    setTimeout(() => {
        screen.style.display = 'none';
        startVisualization();
    }, 1500);
});

// ─────────────────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────────────────
initCanvases();
initStars();
initParticles();
buildScanLines();

</script>
</body>
